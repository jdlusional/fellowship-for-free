name: Weekly candidate import (review only)

# Fetches fellowship candidates into pending/candidates.json (a REVIEW QUEUE),
# commits the updated queue, and opens a GitHub Issue listing what is waiting.
# It does NOT touch data/fellowships.json or the live site. Nothing publishes
# until you approve candidates and run approve_candidates.py yourself.

on:
  schedule:
    # Mondays at 13:00 UTC. Adjust as you like (cron is in UTC).
    - cron: "0 13 * * 1"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write   # to commit the updated review queue
  issues: write     # to open the weekly review Issue

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch candidates into the review queue
        run: python scripts/fetch_candidates.py

      - name: Commit the updated review queue
        run: |
          git config user.name "f4f-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- pending/candidates.json; then
            echo "No changes to the review queue."
          else
            git add pending/candidates.json
            git commit -m "Weekly import: refresh review queue [skip ci]"
            git push
          fi

      - name: Build the review Issue body
        run: python scripts/notify_issue.py > /tmp/issue_body.md

      - name: Open the weekly review Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="F4F weekly review — $(date -u +%Y-%m-%d)"
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/issue_body.md \
            --label "review-queue" \
          || gh issue create \
            --title "$TITLE" \
            --body-file /tmp/issue_body.md
